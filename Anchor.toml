[toolchain]
anchor_version = "0.31.1"

[features]
resolution = true
skip-lint = false

[programs.localnet]
voicedesk = "41HHr5soWR3ScMDKZWPDiaN63KXaqkiAaauzE9MjUtWT"

[programs.devnet]
voicedesk = "41HHr5soWR3ScMDKZWPDiaN63KXaqkiAaauzE9MjUtWT"

[registry]
url = "https://api.apr.dev"

[provider]
# `anchor test` uses this cluster. localnet spins up a local validator
# (fast + free). For explicit devnet deploys use:
#   anchor deploy --provider.cluster devnet
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
# Use npx instead of yarn so npm-only environments work.
test = "npx ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

# After first `anchor build`, replace the placeholder program ID above with
# the value printed by `solana address -k target/deploy/voicedesk-keypair.json`.
# Then update the `declare_id!` in programs/voicedesk/src/lib.rs to match.
